<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送信完了 | セミナーアンケート</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #f8f9fa; }
    .card {
      max-width: 480px;
      margin: 80px auto;
      text-align: center;
      padding: 2.5rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
    }
    .check-icon { font-size: 3rem; color: #198754; }
  </style>
</head>
<body>
  <div class="card bg-white">
    <div class="check-icon mb-3">&#10003;</div>
    <h1 class="h4 mb-2">送信が完了しました</h1>
    <p class="text-muted mb-4">アンケートへのご協力ありがとうございました。<br>いただいたご意見を今後のセミナーに活かしてまいります。</p>
    <a href="/" class="btn btn-outline-primary mb-4">アンケートトップへ戻る</a>

    <div class="text-start mt-3 p-3" style="background: #fff8e1; border-radius: 8px;">
      <div class="fw-semibold mb-2">違和感クイズの答え</div>
      <p class="mb-2"><strong>正解：電話番号欄の入力が全角に変換される</strong></p>
      <p class="text-muted small mb-0">AIに入力まわりの処理を任せた際、電話番号欄にも全角に変換する処理が入ってしまいました。「半角」と表記されているにもかかわらず、入力すると全角に変換されてしまう不具合です。</p>
    </div>
  </div>
</body>
</html>
